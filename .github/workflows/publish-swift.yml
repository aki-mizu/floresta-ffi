# Runs on every push to the swift branch and on swift/vX.Y.Z tags.
#
# Push to branch  →  full build, publishes a rolling "dev" pre-release on
#                    floresta-swift (tag is force-updated each time).
# Push swift/vX.Y.Z  →  same but creates a proper versioned release.
# workflow_dispatch  →  same as tag, version specified manually.
#
# Required secret: SWIFT_PACKAGE_TOKEN
#   A Personal Access Token (or fine-grained token) on the aki-mizu account
#   with "Contents: Read and Write" on aki-mizu/floresta-swift.

name: Publish Swift Package

on:
  push:
    branches:
      - swift
    tags:
      - 'swift/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v0.2.0)'
        required: true

jobs:
  build-and-publish:
    runs-on: macos-latest

    steps:
      - name: Resolve release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}"   >> "$GITHUB_OUTPUT"
            echo "prerelease=false"            >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME#swift/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false"              >> "$GITHUB_OUTPUT"
          else
            # Branch push — publish as a rolling "dev" pre-release
            echo "tag=dev"         >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout floresta-ffi-aki
        uses: actions/checkout@v4
        with:
          path: floresta-ffi-aki

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: floresta-ffi-aki/floresta-ffi -> floresta-ffi-aki/floresta-ffi/target

      - name: Install Boost (required by libbitcoinkernel cmake)
        run: brew install boost

      - name: Checkout floresta-swift
        uses: actions/checkout@v4
        with:
          repository: aki-mizu/floresta-swift
          token: ${{ secrets.SWIFT_PACKAGE_TOKEN }}
          path: floresta-swift

      - name: Build release XCFramework
        working-directory: floresta-ffi-aki
        env:
          RELEASE_URL: "https://github.com/aki-mizu/floresta-swift/releases/download/${{ steps.version.outputs.tag }}/florestaFFI.xcframework.zip"
        run: bash floresta-swift/scripts/release/build-release-macos-aarch64.sh

      - name: Commit and push to floresta-swift
        working-directory: floresta-swift
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift Sources/Floresta/floresta.swift
          if git diff --staged --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Release ${{ steps.version.outputs.tag }}"
          fi
          # dev: force-move the tag so it always points to the latest commit.
          # versioned: create a new tag.
          if [ "${{ steps.version.outputs.tag }}" = "dev" ]; then
            git tag -f dev
            git push origin main
            git push -f origin dev
          else
            git tag "${{ steps.version.outputs.tag }}"
            git push origin main
            git push origin "${{ steps.version.outputs.tag }}"
          fi

      - name: Create / update GitHub Release on floresta-swift
        uses: softprops/action-gh-release@v2
        with:
          repository: aki-mizu/floresta-swift
          tag_name: ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          make_latest: ${{ steps.version.outputs.prerelease == 'false' }}
          files: floresta-swift/florestaFFI.xcframework.zip
          token: ${{ secrets.SWIFT_PACKAGE_TOKEN }}
